name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── API (Python) ─────────────────────────────────────────────────────────────
  api-test:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ewaste_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt
        working-directory: .

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ewaste_test
          DATABASE_SYNC_URL: postgresql://postgres:postgres@localhost:5432/ewaste_test
        run: alembic upgrade head
        working-directory: api

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ewaste_test
          DATABASE_SYNC_URL: postgresql://postgres:postgres@localhost:5432/ewaste_test
          AUTH0_DOMAIN: test.auth0.com
          AUTH0_AUDIENCE: https://api.ewastetradeflow.com
          S3_BUCKET: test-bucket
          PUPPETEER_SERVICE_URL: http://localhost:3001
          PUPPETEER_INTERNAL_KEY: test-key
          ENV: test
        run: pytest --tb=short -q
        working-directory: api

  # ── Data pipeline (dbt) ───────────────────────────────────────────────────────
  dbt-test:
    name: dbt Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ewaste_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: Run dbt seed + compile + test (schema only)
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ewaste_test
          DBT_PROFILES_DIR: ${{ github.workspace }}/data-pipeline/dbt
        run: |
          dbt deps
          dbt seed --target dev
          dbt compile --target dev
        working-directory: data-pipeline/dbt

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Build + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests
        run: npm test -- --run
        working-directory: frontend

      - name: Build
        env:
          VITE_API_URL: https://api.ewastetradeflow.com
          VITE_AUTH0_DOMAIN: placeholder.auth0.com
          VITE_AUTH0_CLIENT_ID: placeholder
          VITE_AUTH0_AUDIENCE: https://api.ewastetradeflow.com
          VITE_MAPTILER_KEY: placeholder
        run: npm run build
        working-directory: frontend

  # ── Puppeteer microservice ────────────────────────────────────────────────────
  puppeteer-build:
    name: Puppeteer Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: puppeteer/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: puppeteer

      - name: Syntax check
        run: node --check src/index.js
        working-directory: puppeteer
