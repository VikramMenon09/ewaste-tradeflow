name: Scheduled Data Pipeline

on:
  schedule:
    # Run every Sunday at 02:00 UTC — weekly Comtrade + OECD + WB Governance refresh
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      source:
        description: "Data source to run (comtrade|oecd|wb_governance|all)"
        required: true
        default: "all"
        type: choice
        options: [comtrade, oecd, wb_governance, all]
      year:
        description: "Year to fetch (leave blank for previous year)"
        required: false
        type: string
      dry_run:
        description: "Dry run (log only, no writes)"
        required: false
        type: boolean
        default: false

jobs:
  run-pipeline:
    name: Run Data Ingestion Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: data-pipeline

      - name: Determine year argument
        id: year
        run: |
          if [ -n "${{ inputs.year }}" ]; then
            echo "arg=--year ${{ inputs.year }}" >> $GITHUB_OUTPUT
          else
            echo "arg=" >> $GITHUB_OUTPUT
          fi

      - name: Run ingestion pipeline
        env:
          DATABASE_SYNC_URL: ${{ secrets.DATABASE_SYNC_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
        run: |
          SOURCE="${{ inputs.source || 'all' }}"
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python ingestion/run_ingestion.py \
            --source $SOURCE \
            ${{ steps.year.outputs.arg }} \
            $DRY_RUN_FLAG \
            --run-type scheduled \
            --triggered-by "github-actions"
        working-directory: data-pipeline

      - name: Run dbt transformations
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DBT_PROFILES_DIR: ${{ github.workspace }}/data-pipeline/dbt
        run: |
          pip install dbt-core dbt-postgres
          cd data-pipeline/dbt
          dbt run --target production
          dbt test --target production
        working-directory: .

      - name: Invalidate API cache
        env:
          API_URL: ${{ secrets.VITE_API_URL }}
          CACHE_INVALIDATION_KEY: ${{ secrets.CACHE_INVALIDATION_KEY }}
        run: |
          curl -s -X POST "${API_URL}/api/v1/internal/cache/invalidate" \
            -H "X-Service-Key: ${CACHE_INVALIDATION_KEY}" \
            -H "Content-Type: application/json" || echo "Cache invalidation failed (non-fatal)"
