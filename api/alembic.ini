# Alembic configuration file for EWasteTradeFlow API
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with this path when loading the env.py module
# (set to "." so imports relative to /api/ work)
prepend_sys_path = .

# Truncate long names in filenames
truncate_slug_length = 40

# Whether to use a timezone-aware server_default for timestamps
timezone = UTC

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
