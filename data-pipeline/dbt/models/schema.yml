version: 2

models:
  # ── Staging ─────────────────────────────────────────────────────────────────

  - name: stg_comtrade
    description: >
      Staging view for UN Comtrade trade flow data. Applies type casting, ISO3
      normalization, and confidence tier tagging.
    columns:
      - name: reporter_iso3
        tests: [not_null]
      - name: partner_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: hs_code
        tests: [not_null]
      - name: flow_code
        tests:
          - not_null
          - accepted_values:
              values: ["X", "M"]
      - name: confidence_tier
        tests:
          - not_null
          - accepted_values:
              values: ["reported"]

  - name: stg_un_monitor
    description: >
      Staging view for UN Global E-Waste Monitor generation data.
    columns:
      - name: iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: total_mt
        tests: [not_null]
      - name: confidence_tier
        tests:
          - accepted_values:
              values: ["reported", "estimated"]

  - name: stg_oecd_flows
    description: >
      Staging view for OECD ENV_WASTE_TRAN transboundary waste flows.
    columns:
      - name: exporter_iso3
        tests: [not_null]
      - name: importer_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: volume_mt
        tests: [not_null]
      - name: ewaste_category_code
        tests:
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5, 6]

  - name: stg_wb_governance
    description: >
      Staging view for World Bank Governance Indicators.
    columns:
      - name: iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: confidence_tier
        tests:
          - accepted_values:
              values: ["reported"]

  - name: stg_basel_status
    description: >
      Staging view for Basel Convention party/ratification status.
      One row per country (static reference).
    columns:
      - name: iso3
        tests:
          - not_null
          - unique
      - name: is_party
        tests: [not_null]
      - name: ban_amendment_ratified
        tests: [not_null]

  # ── Intermediate ─────────────────────────────────────────────────────────────

  - name: int_trade_flows_unified
    description: >
      Central trade flow reconciliation: joins Comtrade and OECD, resolves
      source conflicts, applies Basel compliance flags and PRS risk flags.
    columns:
      - name: exporter_iso3
        tests: [not_null]
      - name: importer_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: volume_mt
        tests: [not_null]

  - name: int_generation_filled
    description: >
      UN Monitor generation data with gaps filled via linear interpolation.
    columns:
      - name: iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: total_mt
        tests: [not_null]
      - name: is_interpolated
        tests: [not_null]

  - name: int_prs_components
    description: >
      Processing Risk Score component breakdown per country-year.
    columns:
      - name: iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: prs_score
        tests: [not_null]

  # ── Marts ────────────────────────────────────────────────────────────────────

  - name: mart_countries
    description: >
      Country reference table combining Basel status, OECD membership, and
      income classification. Depended on by all other mart models.
    columns:
      - name: iso3
        tests:
          - not_null
          - unique
      - name: name
        tests: [not_null]
      - name: income_classification
        tests:
          - accepted_values:
              values: ["high", "upper_middle", "lower_middle", "low"]
              config:
                where: "income_classification IS NOT NULL"

  - name: mart_ewaste_generation
    description: Final e-waste generation metrics, materialized for query performance.
    columns:
      - name: country_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: total_mt
        tests: [not_null]

  - name: mart_trade_flows
    description: Final trade flows with all enrichments applied.
    columns:
      - name: exporter_iso3
        tests: [not_null]
      - name: importer_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]

  - name: mart_processing_risk_scores
    description: Final Processing Risk Score per country-year.
    columns:
      - name: country_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: prs_score
        tests: [not_null]

  - name: mart_choropleth_cache
    description: Pre-aggregated per-country metrics for the choropleth map.
    columns:
      - name: country_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]

  - name: mart_sankey_cache
    description: Pre-ranked bilateral trade flow records for the Sankey diagram.
    columns:
      - name: year
        tests: [not_null]
      - name: exporter_iso3
        tests: [not_null]
      - name: importer_iso3
        tests: [not_null]
